<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element Inspector & Notepad</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>Element Inspector & Notepad</h1>
      <button id="inspect-btn" class="btn btn-primary">
        <span class="btn-icon">◎</span>
        Start Inspecting
      </button>
    </header>
    
    <main class="popup-content">
      <div id="elements-list" class="elements-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">⌘</div>
          <p>No elements captured yet</p>
          <p class="empty-hint">Click "Start Inspecting" to begin selecting elements on the page</p>
        </div>
      </div>
      
      <!-- Session Elements Panel - shows captured elements in real-time -->
      <div id="session-panel" class="session-panel">
        <h3 class="panel-heading">Captured This Session</h3>
        <div id="session-elements-panel" class="session-elements-list">
          <p class="empty-hint">Click "Start Inspecting" then click elements on the page</p>
        </div>
      </div>
      
      <!-- Flow Panel - shows Point A to Point B -->
      <div id="flow-panel" class="flow-panel">
        <p class="empty-hint">Use "Capture Flow" to track movement</p>
      </div>
    </main>
    
    <footer class="popup-footer">
    <button id="undo-btn" class="btn btn-secondary" disabled>Undo</button>
    <button id="clear-btn" class="btn btn-secondary" disabled>Clear All</button>
    <button id="export-btn" class="btn btn-secondary" disabled>Export</button>
  </footer>
  
  <!-- Developer Tools Section -->
  <section class="dev-tools-section">
    <h2 class="dev-tools-title">Developer Tools</h2>
    <div class="dev-tools-grid">
      <button id="ai-desc-btn" class="btn btn-tool" title="Get prompt-ready description for AI agents">
        <span class="btn-icon">🤖</span>
        AI Description
      </button>
      <button id="coords-btn" class="btn btn-tool" title="Click to capture screen coordinates">
        <span class="btn-icon">📍</span>
        Capture Position
      </button>
      <button id="viewport-btn" class="btn btn-tool" title="Get viewport and responsive info">
        <span class="btn-icon">📐</span>
        Viewport Info
      </button>
      <button id="presets-btn" class="btn btn-tool" title="Show industry standard layouts">
        <span class="btn-icon">📏</span>
        Layout Presets
      </button>
      <button id="stacking-btn" class="btn btn-tool" title="Analyze z-index and stacking issues">
        <span class="btn-icon">🎯</span>
        Analyze Stacking
      </button>
    </div>
  </section>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
