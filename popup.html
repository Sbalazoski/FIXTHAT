<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element Inspector & Notepad</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>Element Inspector & Notepad</h1>
      <button id="inspect-btn" class="btn btn-primary">
        <span class="btn-icon">◎</span>
        Start Inspecting
      </button>
    </header>
    
    <main class="popup-content">
      <div id="elements-list" class="elements-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">⌘</div>
          <p>No elements captured yet</p>
          <p class="empty-hint">Click "Start Inspecting" to begin selecting elements on the page</p>
        </div>
      </div>
    </main>
    
    <footer class="popup-footer">
      <button id="clear-btn" class="btn btn-secondary" disabled>Clear All</button>
      <button id="export-btn" class="btn btn-secondary" disabled>Export</button>
    </footer>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
